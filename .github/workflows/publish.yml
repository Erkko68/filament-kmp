name: Publish to Maven Central

on:
  push:
    tags:
      - '[0-9]*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g. 0.1.0)'
        required: true

jobs:
  # ── Build the combined JNI native per platform (cmake only) ──────────────────
  # Filament + filamat + gltfio + filament-utils are all built into ONE shared lib
  # (libfilament-jni) by :java:filament. The other three java/* modules are pure-Java
  # glue and ship no natives — they pick up the dylib transitively from :java:filament.
  #
  # Layout uploaded: <platform-arch>/<libfilament-jni.{dylib,so,dll}>.
  # download-artifact + merge-multiple later collapses every platform into one
  # jni-artifacts/ dir that's consumed via -PjniArtifactsDir in :java:filament.
  build-jni:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: macosArm64
            arch: macos-arm64
          - os: ubuntu-latest
            target: linuxX64
            arch: linux-x64
          - os: ubuntu-24.04-arm
            target: linuxArm64
            arch: linux-arm64
          - os: windows-latest
            target: mingwX64
            arch: windows-x64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { java-version: '17', distribution: 'temurin' }
      - uses: actions/setup-python@v5
        with: { python-version: '3.x' }
      - uses: gradle/actions/setup-gradle@v4
      - name: Install C++ deps (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get install -y clang libc++-dev libc++abi-dev libgl-dev
      - name: Read Filament version
        id: ver
        shell: bash
        run: echo "v=$(grep '^filaVersion=' gradle.properties | cut -d= -f2)" >> $GITHUB_OUTPUT
      - uses: actions/cache@v4
        with:
          path: prebuilts/${{ matrix.target }}
          key: filament-prebuilts-${{ steps.ver.outputs.v }}-${{ matrix.target }}
      - name: Download prebuilts
        run: ./gradlew downloadPrebuilts_${{ matrix.target }}
      - name: Build combined JNI native
        shell: bash
        run: ./gradlew :java:filament:cmakeBuild --no-configuration-cache
      - name: Stage native
        shell: bash
        run: |
          dest="jni-artifacts/${{ matrix.arch }}"
          mkdir -p "$dest"
          find "java/filament/build/cmake" \
            \( -name "*.dylib" -o -name "*.so" -o -name "*.dll" \) \
            -exec cp {} "$dest/" \;
      - uses: actions/upload-artifact@v4
        with:
          name: jni-${{ matrix.arch }}
          path: jni-artifacts/

  # ── Publish all modules ───────────────────────────────────────────────────────
  publish:
    needs: build-jni
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { java-version: '17', distribution: 'temurin' }
      - uses: actions/setup-python@v5
        with: { python-version: '3.x' }
      - uses: gradle/actions/setup-gradle@v4
      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "version=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT
          else
            echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          fi
      - name: Read Filament version
        id: ver
        run: echo "v=$(grep '^filaVersion=' gradle.properties | cut -d= -f2)" >> $GITHUB_OUTPUT
      - uses: actions/cache@v4
        with:
          path: |
            prebuilts/iosArm64
            prebuilts/iosSimulatorArm64
            prebuilts/iosX64
            prebuilts/macosArm64
          key: filament-prebuilts-${{ steps.ver.outputs.v }}-ios-macos
      - name: Download iOS + macOS prebuilts
        run: |
          ./gradlew \
            downloadPrebuilts_iosArm64 \
            downloadPrebuilts_iosSimulatorArm64 \
            downloadPrebuilts_iosX64 \
            downloadPrebuilts_macosArm64
      - name: Download JNI natives
        uses: actions/download-artifact@v4
        with:
          pattern: jni-*
          path: jni-artifacts/
          merge-multiple: true
      - name: Publish to Maven Central
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVENCENTRAL_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVENCENTRAL_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyId: ${{ secrets.SIGNING_KEY_ID }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.SIGNING_KEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.SIGNING_PASSWORD }}
        run: |
          ./gradlew \
            -PlibVersion=${{ steps.version.outputs.version }} \
            -PjniArtifactsDir=${{ github.workspace }}/jni-artifacts \
            :java:filament:publishAllPublicationsToMavenCentralRepository \
            :java:filamat:publishAllPublicationsToMavenCentralRepository \
            :java:filament-utils:publishAllPublicationsToMavenCentralRepository \
            :java:gltfio:publishAllPublicationsToMavenCentralRepository \
            :kotlin:filament:publishAllPublicationsToMavenCentralRepository \
            :kotlin:filamat:publishAllPublicationsToMavenCentralRepository \
            :kotlin:filament-utils:publishAllPublicationsToMavenCentralRepository \
            :kotlin:gltfio:publishAllPublicationsToMavenCentralRepository \
            :kotlin:filament-compose:publishAllPublicationsToMavenCentralRepository \
            :js:publishAllPublicationsToMavenCentralRepository \
            --no-configuration-cache
