# Run the Gradle daemon itself on JDK 25.
#
# The filament JVM bindings (Project Panama / FFM) are compiled to a JVM 22 floor and call
# java.lang.foreign. Running the daemon on JDK 25 makes 25 the default toolchain *and* the default
# requested `org.gradle.jvm.version`, so the FFM artifacts resolve, compile, and test without any
# per-module toolchain/attribute forcing. Bytecode targets are still pinned independently
# (Android → JVM 11, the jvm modules → JVM 22), so nothing about produced-artifact compatibility
# changes — this only sets the JVM the build tooling runs on.
#
# A JDK 25 install must therefore be discoverable (auto-detected, JAVA_HOME, or
# org.gradle.java.installations.paths in gradle.properties) — the daemon JVM is resolved before any
# settings plugin loads, so it can't be auto-downloaded via foojay.
toolchainVersion=25
