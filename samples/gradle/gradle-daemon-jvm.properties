# Run the samples Gradle daemon on JDK 25 — the desktop app depends on the filament FFM bindings
# (JVM 22 bytecode, java.lang.foreign), so 25 must be the toolchain and the default requested
# org.gradle.jvm.version. Android stays on JVM 11. A JDK 25 install must be discoverable
# (auto-detected, JAVA_HOME, or org.gradle.java.installations.paths in gradle.properties).
toolchainVersion=25
