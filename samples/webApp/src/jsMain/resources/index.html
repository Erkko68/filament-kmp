<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Filament KMP — Web</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }

        /* Filament renders into this canvas via WebGL */
        #filament-canvas {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            display: block;
        }

        /* Compose for Web renders on top — transparent background so Filament shows through */
        #compose-root {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none; /* pass mouse events through to canvas */
        }
    </style>
</head>
<body>
    <canvas id="filament-canvas"></canvas>
    <div id="compose-root"></div>
    <script src="filament.js"></script>
    <script src="webApp.js"></script>
</body>
</html>
